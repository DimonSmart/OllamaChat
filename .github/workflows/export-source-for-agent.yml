name: Apply and validate Harness migration

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  push:
    branches:
      - agent/replace-direct-chat-with-harness-agent
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/replace-direct-chat-with-harness-agent
          fetch-depth: 0
      - name: Require migration patch
        run: test -f .github/agent-migration.patch.gz.b64
      - name: Check and apply migration patch
        id: apply
        shell: bash
        run: |
          set +e
          base64 --decode .github/agent-migration.patch.gz.b64 | gzip --decompress > /tmp/agent-migration.patch 2> /tmp/apply.log
          status=$?
          if [ "$status" = "0" ]; then
            git apply --check /tmp/agent-migration.patch >> /tmp/apply.log 2>&1
            status=$?
          fi
          if [ "$status" = "0" ]; then
            git apply --index /tmp/agent-migration.patch >> /tmp/apply.log 2>&1
            status=$?
          fi
          if [ "$status" = "0" ]; then
            git rm .github/agent-migration.patch.gz.b64 >> /tmp/apply.log 2>&1
          fi
          echo "$status" > /tmp/apply-status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: harness-patch-diagnostics
          path: |
            /tmp/apply.log
            /tmp/apply-status
            /tmp/agent-migration.patch
          retention-days: 1
      - name: Fail on patch errors
        run: test "$(cat /tmp/apply-status)" = "0"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore OllamaChat.sln
      - name: Test
        id: test
        shell: bash
        run: |
          set +e
          dotnet test OllamaChat.sln --no-restore --configuration Release > /tmp/test.log 2>&1
          status=$?
          grep -E "error (CS|NU)[0-9]+|Build FAILED|Test Run Failed|Failed!|\[FAIL\]" /tmp/test.log > /tmp/diagnostics.log || tail -n 160 /tmp/test.log > /tmp/diagnostics.log
          echo "$status" > /tmp/test-status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: harness-migration-diagnostics
          path: |
            /tmp/diagnostics.log
            /tmp/test.log
            /tmp/test-status
          retention-days: 1
      - name: Fail on validation errors
        run: test "$(cat /tmp/test-status)" = "0"
      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Migrate direct chat to HarnessAgent"
          git push origin HEAD:agent/replace-direct-chat-with-harness-agent
