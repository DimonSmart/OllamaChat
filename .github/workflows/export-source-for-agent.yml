name: Apply and validate Harness migration

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/replace-direct-chat-with-harness-agent
          fetch-depth: 0
      - name: Detect queued migration
        id: gate
        shell: bash
        run: |
          if test -f .github/agent-migration.ready; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Assemble and apply migration patch
        if: steps.gate.outputs.ready == 'true'
        shell: bash
        run: |
          cat .github/agent-migration-v2.part-* > /tmp/agent-migration.patch.gz.b64
          test "$(sha256sum /tmp/agent-migration.patch.gz.b64 | cut -d' ' -f1)" = "c84765d39964f62bf977c0b74160876ee2ebf74e05a00f14cb4f7f7550bd2c2a"
          base64 --decode /tmp/agent-migration.patch.gz.b64 | gzip --decompress > /tmp/agent-migration.patch
          test "$(sha256sum /tmp/agent-migration.patch | cut -d' ' -f1)" = "abaaece39718ceb3adb038b038d1e50fbf8d0e84a7fc5add31ffe7f6f10ab2ae"
          git apply --check /tmp/agent-migration.patch
          git apply --index /tmp/agent-migration.patch
          git rm .github/agent-migration-v2.part-* .github/agent-migration.patch.part-* .github/agent-migration.ready
          git rm -f .github/agent-migration.patch.gz.b64
      - uses: actions/setup-dotnet@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          dotnet-version: 10.0.x
      - name: Restore
        if: steps.gate.outputs.ready == 'true'
        run: dotnet restore OllamaChat.sln
      - name: Test
        if: steps.gate.outputs.ready == 'true'
        id: test
        shell: bash
        run: |
          set +e
          dotnet test OllamaChat.sln --no-restore --configuration Release > /tmp/test.log 2>&1
          status=$?
          grep -E "error (CS|NU)[0-9]+|Build FAILED|Test Run Failed|Failed!|\[FAIL\]" /tmp/test.log > /tmp/diagnostics.log || tail -n 180 /tmp/test.log > /tmp/diagnostics.log
          echo "$status" > /tmp/test-status
          exit 0
      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          name: harness-migration-diagnostics
          path: |
            /tmp/diagnostics.log
            /tmp/test.log
            /tmp/test-status
          retention-days: 1
      - name: Fail on validation errors
        if: steps.gate.outputs.ready == 'true'
        run: test "$(cat /tmp/test-status)" = "0"
      - name: Commit validated changes
        if: steps.gate.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Migrate direct chat to HarnessAgent"
          git push origin HEAD:agent/replace-direct-chat-with-harness-agent
