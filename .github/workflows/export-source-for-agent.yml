name: Export source for agent

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: ollamachat-source
          path: .
          include-hidden-files: true
          retention-days: 1
