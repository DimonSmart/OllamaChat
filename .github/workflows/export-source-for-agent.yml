name: Apply and validate Harness migration

on:
  push:
    branches:
      - agent/replace-direct-chat-with-harness-agent
    paths:
      - .github/agent-migration.ready
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/replace-direct-chat-with-harness-agent
          fetch-depth: 0
      - name: Assemble and apply migration patch
        shell: bash
        run: |
          cat .github/agent-migration.patch.part-* > /tmp/agent-migration.patch.gz.b64
          test "$(sha256sum /tmp/agent-migration.patch.gz.b64 | cut -d' ' -f1)" = "5e3b2eeb3f841f33a654602a08f670c61639c78df6beb842a5ada95273c47808"
          base64 --decode /tmp/agent-migration.patch.gz.b64 | gzip --decompress > /tmp/agent-migration.patch
          test "$(sha256sum /tmp/agent-migration.patch | cut -d' ' -f1)" = "9951788f7d1386bb335e3869f1275e99ea9f947757e20e0e6a1a1f467457e1ae"
          git apply --check /tmp/agent-migration.patch
          git apply --index /tmp/agent-migration.patch
          git rm .github/agent-migration.patch.part-* .github/agent-migration.ready
          git rm -f .github/agent-migration.patch.gz.b64
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore OllamaChat.sln
      - name: Test
        id: test
        shell: bash
        run: |
          set +e
          dotnet test OllamaChat.sln --no-restore --configuration Release > /tmp/test.log 2>&1
          status=$?
          grep -E "error (CS|NU)[0-9]+|Build FAILED|Test Run Failed|Failed!|\[FAIL\]" /tmp/test.log > /tmp/diagnostics.log || tail -n 180 /tmp/test.log > /tmp/diagnostics.log
          echo "$status" > /tmp/test-status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: harness-migration-diagnostics
          path: |
            /tmp/diagnostics.log
            /tmp/test.log
            /tmp/test-status
          retention-days: 1
      - name: Fail on validation errors
        run: test "$(cat /tmp/test-status)" = "0"
      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Migrate direct chat to HarnessAgent"
          git push origin HEAD:agent/replace-direct-chat-with-harness-agent
